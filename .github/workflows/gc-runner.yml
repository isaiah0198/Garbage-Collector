# .github/workflows/gc-runner.yml
name: Run GC Simulator

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  run-gc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Java GC
        run: |
          cd java
          javac HeapSimulator.java
          java HeapSimulator > ../reports/java-report.txt

      - name: Run Python GC
        run: |
          cd python
          python ref_counter.py > ../reports/python-report.txt

      - name: Run JS Orchestrator
        run: |
          cd js
          node tricolour.js > ../reports/js-report.json

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: gc-reports
          path: reports/
